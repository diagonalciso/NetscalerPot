<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citrix Gateway</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Helvetica Neue", Arial, sans-serif;
    background: #f0f0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Top banner */
  .banner {
    background: #000;
    color: #fff;
    padding: 6px 20px;
    font-size: 11px;
    text-align: right;
  }

  /* Header bar */
  .header {
    background: linear-gradient(to bottom, #1a5276, #154360);
    padding: 0 30px;
    display: flex;
    align-items: center;
    height: 64px;
  }
  .header-logo {
    color: #fff;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 1px;
  }
  .header-logo span {
    font-weight: 700;
    color: #f39c12;
  }

  /* Main container */
  .container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .login-box {
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 36px 40px 30px;
    width: 380px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }

  .login-box h2 {
    font-size: 18px;
    font-weight: 600;
    color: #1a5276;
    margin-bottom: 6px;
  }
  .login-box .subtitle {
    font-size: 12px;
    color: #666;
    margin-bottom: 24px;
    border-bottom: 1px solid #eee;
    padding-bottom: 14px;
  }

  .field {
    margin-bottom: 14px;
  }
  .field label {
    display: block;
    font-size: 12px;
    color: #444;
    margin-bottom: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .field input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #bbb;
    border-radius: 3px;
    font-size: 14px;
    background: #fafafa;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus {
    border-color: #1a5276;
    background: #fff;
  }

  .error-msg {
    background: #fde8e8;
    border: 1px solid #e74c3c;
    color: #c0392b;
    padding: 8px 12px;
    border-radius: 3px;
    font-size: 13px;
    margin-bottom: 14px;
  }

  .btn-login {
    width: 100%;
    padding: 10px;
    background: #1a5276;
    color: #fff;
    border: none;
    border-radius: 3px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.2s;
  }
  .btn-login:hover { background: #154360; }

  .footer-links {
    text-align: center;
    margin-top: 16px;
    font-size: 11px;
    color: #888;
  }
  .footer-links a { color: #1a5276; text-decoration: none; }
  .footer-links a:hover { text-decoration: underline; }

  /* Page footer */
  .page-footer {
    background: #2c3e50;
    color: #aaa;
    text-align: center;
    padding: 10px;
    font-size: 11px;
  }
  .page-footer span { color: #f39c12; }
</style>
</head>
<body>

<div class="banner">
  Citrix Systems, Inc. &nbsp;|&nbsp; Authorized Access Only
</div>

<div class="header">
  <div class="header-logo"><span>Citrix</span> Gateway</div>
</div>

<div class="container">
  <div class="login-box">
    <h2>Sign In</h2>
    <div class="subtitle">Citrix NetScaler Gateway &mdash; Secure Remote Access</div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/nf/auth/doAuthentication.do" autocomplete="off">
      <div class="field">
        <label>Username</label>
        <input type="text" name="login" id="login" placeholder="domain\username" autofocus required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="passwd" id="passwd" placeholder="Password" required>
      </div>
      <div class="field">
        <label>Domain</label>
        <input type="text" name="domain" id="domain" placeholder="CORP">
      </div>
      <button type="submit" class="btn-login">Log On</button>
    </form>

    <div class="footer-links">
      <a href="#">Need help?</a> &nbsp;&bull;&nbsp;
      <a href="#">Password reset</a>
    </div>
  </div>
</div>

<div class="page-footer">
  &copy; 1999–2024 <span>Citrix Systems, Inc.</span> &nbsp;|&nbsp; NetScaler 13.1 Build 49.13
</div>

</body>
</html>
